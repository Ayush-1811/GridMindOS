	 <script>
	 //Round function
	 function roundNumber(num, scale) {
		  if(!("" + num).includes("e")) {
			return +(Math.round(num + "e+" + scale)  + "e-" + scale);
		  } else {
			var arr = ("" + num).split("e");
			var sig = ""
			if(+arr[1] + scale > 0) {
			  sig = "+";
			}
			return +(Math.round(+arr[0] + "e" + sig + (+arr[1] + scale)) + "e-" + scale);
		  }
		}
        $(document).ready(function () {
            showGraph();
        });


        function showGraph()
        {
            {
				var regn = $('#regin_input').val();
                $.post("data.php", { region: regn},
                function (data)
                {
                    
                     var DAM_Area_Price = [];
                     var RTM_Area_Price = [];
                    var Block_no = [];
					var lastblockTime = '';
					var lastPrice = '';

                    for (var i in data) {
						if(data[i].segment=='DAM'){
                          DAM_Area_Price.push(roundNumber((data[i].area_price)/1000, 2));
						  Block_no.push(data[i].block_no_code);
						}else if(data[i].segment=='RTM'){
                        RTM_Area_Price.push(roundNumber((data[i].area_price)/1000, 2));
						lastblockTime = data[i].block_no_code;
						lastPrice = roundNumber((data[i].area_price)/1000, 2);
						}
                        
                    }
					$('#lastPrice').html(lastPrice);
					$('#lastblockTime').html(lastblockTime);
					//console.log(lastblockTime);
					//console.log(lastPrice);
					//Chart Js Start
					   var data = {
						labels: Block_no,
						datasets: [
							{
								label: "DAM-ACP",
								fill: "transparent",
								borderColor: "#2196f3",
								pointColor: "#2196f3",
								pointStrokeColor: "#0a5fa2",
								pointHighlightFill: "#0a5fa2",
								pointHighlightStroke: "rgba(220,220,220,1)",
								data: DAM_Area_Price
							},
							{
								label: "RTM-ACP",
								fill: "transparent",
								borderColor: "#a48a22",
								pointColor: "#a48a22",
								pointStrokeColor: "#67550c",
								pointHighlightFill: "#67550c",
								pointHighlightStroke: "rgba(151,187,205,1)",
								data: RTM_Area_Price
							}
						]
					};
					
					
					var options = {
							"elements": {

							  }
							},

							},

							},

									"labelString": "Time Period"
								  },
								  "stacked": false,
								  "ticks": {

								  "time": {
